name: refresh-stats

on:
  schedule:
    - cron: '0 */3 * * *'      # 3시간마다(UTC). 항상 최신 유지
  workflow_dispatch:            # 수동 실행 버튼

permissions:
  contents: write

concurrency:
  group: refresh-stats
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build stats page
        env:
          GOATCOUNTER_TOKEN: ${{ secrets.GOATCOUNTER_TOKEN }}
        run: python build_stats.py
      - name: Commit if changed
        run: |
          git config user.name "stats-bot"
          git config user.email "stats-bot@users.noreply.github.com"
          git add index.html
          if git diff --cached --quiet; then
            echo "변경 없음 - 커밋 생략"
          else
            git commit -m "auto: refresh stats"
            git push
          fi
